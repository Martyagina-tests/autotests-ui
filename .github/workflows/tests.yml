name: UI tests

on:
  push:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Create .env
        run: |
          echo "APP_URL=https://nikita-filonov.github.io/qa-automation-engineer-ui-course" >> .env
          echo "HEADLESS=true" >> .env
          echo "BROWSERS=[\"webkit\",\"chromium\",\"firefox\"]" >> .env
          echo "TEST_USER.EMAIL=user.name@gmail.com" >> .env
          echo "TEST_USER.USERNAME=username" >> .env
          echo "TEST_USER.PASSWORD=password" >> .env
          echo "TEST_DATA.IMAGE_PNG_FILE=./testdata/files/image.png" >> .env

      - name: Run tests
        run: pytest -m regression --alluredir=allure-results --numprocesses 2

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results


  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history