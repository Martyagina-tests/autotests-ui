name: UI tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - run: |
          echo "APP_URL=https://nikita-filonov.github.io/qa-automation-engineer-ui-course" >> .env
          echo "HEADLESS=true" >> .env
          echo "BROWSERS=[\"webkit\",\"chromium\",\"firefox\"]" >> .env
          echo "TEST_USER.EMAIL=user.name@gmail.com" >> .env
          echo "TEST_USER.USERNAME=username" >> .env
          echo "TEST_USER.PASSWORD=password" >> .env
          echo "TEST_DATA.IMAGE_PNG_FILE=./testdata/files/image.png" >> .env

      - run: pytest -m regression --alluredir=allure-results --numprocesses 2

      - uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        uses: andgineer/allure-report@v3
        with:
          allure-results: allure-results
          reports-site-path: ./allure-report

      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report