publish-report:
  if: always()
  needs: [ run-tests ]
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results

    # ✅ Устанавливаем Java (нужно для Allure)
    - name: Install Java
      run: sudo apt-get update && sudo apt-get install -y default-jre

    # ✅ Устанавливаем Allure
    - name: Install Allure
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
        tar -zxvf allure-2.24.0.tgz
        sudo ln -s $PWD/allure-2.24.0/bin/allure /usr/bin/allure

    # ✅ Генерируем отчет
    - name: Generate Allure report
      run: allure generate allure-results -o allure-report

    # ✅ Деплой в gh-pages
    - name: Deploy report
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report