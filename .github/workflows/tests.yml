name: UI tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
          pip install pytest-cov  # Явно устанавливаем pytest-cov
          playwright install --with-deps

      - name: Create .env
        run: |
          echo "APP_URL=https://nikita-filonov.github.io/qa-automation-engineer-ui-course" >> .env
          echo "HEADLESS=true" >> .env
          echo "BROWSERS=[\"webkit\",\"chromium\",\"firefox\"]" >> .env
          echo "TEST_USER.EMAIL=user.name@gmail.com" >> .env
          echo "TEST_USER.USERNAME=username" >> .env
          echo "TEST_USER.PASSWORD=password" >> .env
          echo "TEST_DATA.IMAGE_PNG_FILE=./testdata/files/image.png" >> .env

      - name: Run tests with coverage
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2 \
            --cov=. \
            --cov-report=html:coverage \
            --cov-report=term

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload Coverage HTML file (specific)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/coverage.html

  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()  # Публикуем отчет даже если тесты упали

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure
        run: |
          npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
