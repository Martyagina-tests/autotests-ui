name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov coverage
          playwright install --with-deps

      - name: Create .env file
        run: |
          echo "APP_URL=https://nikita-filonov.github.io/qa-automation-engineer-ui-course" >> .env
          echo "HEADLESS=true" >> .env
          echo "BROWSERS=[\"webkit\",\"chromium\",\"firefox\"]" >> .env
          echo "TEST_USER.EMAIL=user.name@gmail.com" >> .env
          echo "TEST_USER.USERNAME=username" >> .env
          echo "TEST_USER.PASSWORD=password" >> .env
          echo "TEST_DATA.IMAGE_PNG_FILE=./testdata/files/image.png" >> .env

      - name: Run tests with coverage
        run: |
          pytest -m regression \
            --alluredir=allure-results \
            --numprocesses 2 \
            --cov=. \
            --cov-report=html:coverage_report \
            --cov-report=term

      - name: Rename coverage report to coverage.html
        run: |
          # Переименовываем index.html в coverage.html если нужно
          if [ -f coverage_report/index.html ]; then
            cp coverage_report/index.html coverage_report/coverage.html
            echo "✅ Coverage report generated at coverage_report/coverage.html"
            ls -la coverage_report/
          else
            echo "⚠️ Coverage report not found"
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report/

      - name: Upload specific coverage.html
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage.html
          path: coverage_report/coverage.html

  publish-report:
    if: always()
    needs: [run-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history