name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      # --- Создаём .env на лету с нужными переменными ---
      - name: Create .env file
        run: |
          echo "APP_URL=https://nikita-filonov.github.io/qa-automation-engineer-ui-course" >> .env
          echo "HEADLESS=true" >> .env
          echo "BROWSERS=[\"webkit\",\"chromium\",\"firefox\"]" >> .env
          echo "TEST_USER.EMAIL=user.name@gmail.com" >> .env
          echo "TEST_USER.USERNAME=username" >> .env
          echo "TEST_USER.PASSWORD=password" >> .env
          echo "TEST_DATA.IMAGE_PNG_FILE=./testdata/files/image.png" >> .env

      # Запуск тестов с pytest и генерация Allure отчётов
      - name: Run Playwright tests with pytest and generate Allure results
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      # Получаем историю отчётов Allure
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Генерация отчёта Allure с историей
      - name: Generates Allure Report with history
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      # Деплой отчёта на GitHub Pages
      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history