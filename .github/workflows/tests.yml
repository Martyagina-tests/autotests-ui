name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          APP_URL="https://nikita-filonov.github.io/qa-automation-engineer-ui-course"
          HEADLESS=true
          BROWSERS=["chromium"]
          
          TEST_USER.EMAIL="user.name@gmail.com"
          TEST_USER.USERNAME="username"
          TEST_USER.PASSWORD="password"
          
          TEST_DATA.IMAGE_PNG_FILE="./testdata/files/image.png"
          
          UI_COVERAGE_APPS='[
              {
                  "key": "ui-course",
                  "url": "https://nikita-filonov.github.io/qa-automation-engineer-ui-course/#/auth/login",
                  "name": "UI Course",
                  "tags": ["UI", "COURSES"],
                  "repository": "https://github.com/Nikita-Filonov/qa-automation-engineer-ui-course"
              }
          ]'
          
          UI_COVERAGE_RESULTS_DIR="./coverage-results"
          UI_COVERAGE_HISTORY_FILE="./coverage-history.json"
          UI_COVERAGE_JSON_REPORT_FILE="./coverage-report.json"
          UI_COVERAGE_HTML_REPORT_FILE="./coverage.html"
          EOF

      - name: Run Playwright tests with pytest
        run: |
          pytest -m regression \
            --alluredir=allure-results \
            --numprocesses 2

      # Восстанавливаем историю покрытия из кеша
      - name: Restore Coverage history
        uses: actions/cache/restore@v4
        with:
          path: coverage-history.json
          key: coverage-history-${{ github.run_id }}
          restore-keys: |
            coverage-history-

      # Создаем директорию для результатов покрытия
      - name: Create coverage results directory
        run: |
          mkdir -p coverage-results

      # Генерируем HTML-отчет и обновляем историю
      - name: Generate Coverage report
        run: |
          ui-coverage-tool save-report

      # Сохраняем историю обратно в кеш
      - name: Cache Coverage history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: coverage-history.json
          key: coverage-history-${{ github.run_id }}

      # Загружаем HTML-отчет как артефакт (исправленный путь)
      - name: Upload Coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html  # Изменено с coverage/**/*.html на coverage.html

      # Загружаем JSON отчет если нужен
      - name: Upload Coverage JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json-report
          path: coverage-report.json

      # Загружаем результаты покрытия
      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage-results/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

  publish-report:
    if: always()
    needs: [ run-tests ]
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Allure Commandline
        run: |
          npm install -g allure-commandline

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report